services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aiogram_bot
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ADMINS=${ADMINS}
      - PRESENTON_URL=http://presenton:80
    volumes:
      - ./data:/app/data
    depends_on:
      - presenton
    restart: unless-stopped

  presenton:
    image: ghcr.io/presenton/presenton:latest
    container_name: presenton
    ports:
      - "5001:80"
    volumes:
      - presenton_data:/home/user/app/uploads
    restart: unless-stopped

volumes:
  presenton_data:
