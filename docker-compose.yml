services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aiogram_bot
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ADMINS=${ADMINS}
      - PRESENTON_URL=http://presenton:80
      - API_SECRET=${API_SECRET:-aislide_secret_2026}
    ports:
      - "8082:8080"
    volumes:
      - ./data:/app/data
    networks:
      - aislidebbot_default
    restart: unless-stopped

networks:
  aislidebbot_default:
    external: true
